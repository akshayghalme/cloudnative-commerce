apiVersion: v1
kind: ConfigMap
metadata:
  name: storefront-config
  namespace: commerce
  labels:
    app.kubernetes.io/name: storefront
    app.kubernetes.io/component: frontend
    app.kubernetes.io/part-of: cloudnative-commerce
data:
  NODE_ENV: "production"
  # Internal service URL — storefront calls product-api via ClusterIP Service.
  # Overlays patch this with the environment-specific ingress hostname
  # for browser-side API calls.
  NEXT_PUBLIC_API_URL: "http://product-api.commerce.svc.cluster.local"
