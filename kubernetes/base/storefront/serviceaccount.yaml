apiVersion: v1
kind: ServiceAccount
metadata:
  name: storefront
  namespace: commerce
  labels:
    app.kubernetes.io/name: storefront
    app.kubernetes.io/component: frontend
    app.kubernetes.io/part-of: cloudnative-commerce
  annotations:
    # IRSA: storefront role allows cloudwatch:PutMetricData for Core Web Vitals.
    # Patched by overlays with the environment-specific ARN.
    eks.amazonaws.com/role-arn: PLACEHOLDER_ROLE_ARN
automountServiceAccountToken: true
