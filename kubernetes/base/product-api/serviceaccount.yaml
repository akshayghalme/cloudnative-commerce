apiVersion: v1
kind: ServiceAccount
metadata:
  name: product-api
  namespace: commerce
  labels:
    app.kubernetes.io/name: product-api
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: cloudnative-commerce
  annotations:
    # IRSA: EKS injects AWS credentials for this role into every pod
    # that uses this ServiceAccount. The role ARN comes from Terraform output:
    #   module.iam.product_api_role_arn
    # Overlays patch this with the environment-specific ARN.
    eks.amazonaws.com/role-arn: PLACEHOLDER_ROLE_ARN
automountServiceAccountToken: true
