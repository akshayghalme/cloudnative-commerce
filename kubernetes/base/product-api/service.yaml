apiVersion: v1
kind: Service
metadata:
  name: product-api
  namespace: commerce
  labels:
    app.kubernetes.io/name: product-api
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: cloudnative-commerce
  annotations:
    # Prometheus ServiceMonitor discovery (used by kube-prometheus-stack)
    prometheus.io/scrape: "true"
spec:
  # ClusterIP: internal-only. The ALB Ingress (Task 26) routes external
  # traffic here. Direct NodePort/LoadBalancer exposure is unnecessary
  # and increases attack surface.
  type: ClusterIP
  selector:
    app.kubernetes.io/name: product-api
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
