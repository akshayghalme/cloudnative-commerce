apiVersion: v1
kind: ServiceAccount
metadata:
  name: order-worker
  namespace: commerce
  labels:
    app.kubernetes.io/name: order-worker
    app.kubernetes.io/component: worker
    app.kubernetes.io/part-of: cloudnative-commerce
  annotations:
    # IRSA: order-worker role allows SQS ReceiveMessage/DeleteMessage.
    # Patched by overlays with the environment-specific ARN.
    eks.amazonaws.com/role-arn: PLACEHOLDER_ROLE_ARN
automountServiceAccountToken: true
