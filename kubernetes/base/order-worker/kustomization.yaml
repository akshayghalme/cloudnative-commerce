apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Note: no Service — order-worker is a queue consumer, not a server.
# Note: no HPA — future scaling via KEDA (SQS queue depth metric).
resources:
  - serviceaccount.yaml
  - configmap.yaml
  - deployment.yaml
  - pdb.yaml

commonLabels:
  app.kubernetes.io/part-of: cloudnative-commerce
  app.kubernetes.io/managed-by: argocd

commonAnnotations:
  argocd.argoproj.io/managed-by: argocd
