# Allow Order Worker — no ingress (SQS consumer pulls, not receives),
# egress to PostgreSQL, Redis, and AWS SQS.
#
# Traffic flow:
#   order-worker → AWS SQS:443 (poll for messages)
#   order-worker → PostgreSQL:5432 (write order records)
#   order-worker → Redis:6379 (cache lookups, idempotency keys)
#
# The order-worker accepts NO inbound traffic — it's a pull-based consumer
# that long-polls SQS. This is the most locked-down service in the stack.

apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-order-worker
  namespace: commerce
  labels:
    app.kubernetes.io/part-of: cloudnative-commerce
    app.kubernetes.io/managed-by: kustomize
    policy-type: service
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: order-worker
  policyTypes:
    - Ingress
    - Egress

  # No ingress rules — order-worker accepts no inbound traffic.
  # Prometheus metrics are the one exception: if the worker exposes a
  # /metrics endpoint, add an ingress rule for the monitoring namespace.
  ingress: []

  egress:
    # Allow to PostgreSQL (RDS) — port 5432
    - to:
        - ipBlock:
            cidr: 10.0.0.0/16
      ports:
        - protocol: TCP
          port: 5432

    # Allow to Redis (ElastiCache) — port 6379
    - to:
        - ipBlock:
            cidr: 10.0.0.0/16
      ports:
        - protocol: TCP
          port: 6379

    # Allow to AWS API endpoints (SQS) — HTTPS
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
            except:
              - 169.254.169.254/32  # Block IMDS
      ports:
        - protocol: TCP
          port: 443
