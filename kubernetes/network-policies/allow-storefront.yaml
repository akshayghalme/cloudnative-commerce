# Allow Storefront — ingress from ingress-nginx, egress to product-api.
#
# Traffic flow:
#   ingress-nginx → storefront:3000 (external web traffic)
#   storefront → product-api:8080 (server-side API calls via Next.js SSR)
#
# The storefront does NOT need direct access to PostgreSQL or Redis —
# all data access goes through the product-api. This is a deliberate
# architectural boundary: the frontend never touches the database.

apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-storefront
  namespace: commerce
  labels:
    app.kubernetes.io/part-of: cloudnative-commerce
    app.kubernetes.io/managed-by: kustomize
    policy-type: service
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: storefront
  policyTypes:
    - Ingress
    - Egress

  ingress:
    # Allow from ingress-nginx controller (external traffic)
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
          podSelector:
            matchLabels:
              app.kubernetes.io/name: ingress-nginx
      ports:
        - protocol: TCP
          port: 3000

    # Allow from Prometheus scraping metrics
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - protocol: TCP
          port: 3000

  egress:
    # Allow to product-api (backend API calls)
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: product-api
      ports:
        - protocol: TCP
          port: 8080
