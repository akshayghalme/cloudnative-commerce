apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# values.yaml is used with `helm install -f values.yaml`, not kustomize.
# Only the ClusterIssuer is applied via kustomize (after cert-manager is running).
resources:
  - clusterissuer.yaml

commonLabels:
  app.kubernetes.io/part-of: cloudnative-commerce
  app.kubernetes.io/managed-by: kustomize
  app.kubernetes.io/component: tls
