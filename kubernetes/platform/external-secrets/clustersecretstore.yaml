# ClusterSecretStore — connects ESO to AWS Secrets Manager.
#
# A ClusterSecretStore is cluster-scoped (vs namespace-scoped SecretStore),
# so any namespace can reference it. This avoids duplicating AWS credentials
# per namespace.
#
# Authentication uses IRSA (IAM Roles for Service Accounts) — the ESO
# service account assumes an IAM role that has permission to read secrets
# from AWS Secrets Manager. No static AWS credentials needed.

apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: aws-secrets-manager
spec:
  provider:
    aws:
      service: SecretsManager
      region: ap-south-1
      # IRSA authentication — the ESO controller's service account is
      # annotated with the IAM role ARN (set in Helm values or via
      # Terraform IAM module). The AWS SDK automatically uses the
      # projected service account token to assume the role.
      auth:
        jwt:
          serviceAccountRef:
            name: external-secrets
            namespace: external-secrets
