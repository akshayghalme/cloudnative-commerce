# ExternalSecret — syncs order-worker secrets from AWS Secrets Manager.
#
# AWS Secrets Manager path: cloudnative-commerce/dev/order-worker
# Expected JSON keys: DATABASE_URL, REDIS_URL, SQS_QUEUE_URL

apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: order-worker
  namespace: commerce
  labels:
    app.kubernetes.io/name: order-worker
    app.kubernetes.io/part-of: cloudnative-commerce
spec:
  refreshInterval: 1h

  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore

  target:
    name: order-worker-secrets
    creationPolicy: Owner

  data:
    - secretKey: DATABASE_URL
      remoteRef:
        key: cloudnative-commerce/dev/order-worker
        property: DATABASE_URL

    - secretKey: REDIS_URL
      remoteRef:
        key: cloudnative-commerce/dev/order-worker
        property: REDIS_URL

    - secretKey: SQS_QUEUE_URL
      remoteRef:
        key: cloudnative-commerce/dev/order-worker
        property: SQS_QUEUE_URL
