# ExternalSecret — syncs product-api secrets from AWS Secrets Manager
# into a Kubernetes Secret in the commerce namespace.
#
# AWS Secrets Manager path: cloudnative-commerce/dev/product-api
# Expected JSON keys: DATABASE_URL, REDIS_URL, JWT_SECRET
#
# ESO polls every 1h and updates the K8s Secret if the AWS secret changed.
# Pods using the secret pick up changes on next restart (or via reloader).

apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: product-api
  namespace: commerce
  labels:
    app.kubernetes.io/name: product-api
    app.kubernetes.io/part-of: cloudnative-commerce
spec:
  refreshInterval: 1h

  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore

  target:
    name: product-api-secrets
    creationPolicy: Owner  # ESO owns the K8s Secret — deleting ExternalSecret deletes the Secret

  data:
    - secretKey: DATABASE_URL
      remoteRef:
        key: cloudnative-commerce/dev/product-api
        property: DATABASE_URL

    - secretKey: REDIS_URL
      remoteRef:
        key: cloudnative-commerce/dev/product-api
        property: REDIS_URL

    - secretKey: JWT_SECRET
      remoteRef:
        key: cloudnative-commerce/dev/product-api
        property: JWT_SECRET
