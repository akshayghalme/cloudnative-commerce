# Argo Rollouts — Canary deployment for product-api in production.
#
# Replaces the standard Deployment with a Rollout resource that manages
# progressive traffic shifting during deploys:
#   10% canary → analysis → 30% → 50% → 100%
#
# At each step, Argo Rollouts runs an AnalysisTemplate that checks:
# - Error rate (5xx responses) must be < 1%
# - P99 latency must be < 500ms
#
# If analysis fails at any step, the rollout automatically aborts and
# routes 100% traffic back to the stable version. No human needed.
#
# Requires: Argo Rollouts controller installed in the cluster.

apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: product-api
  namespace: commerce
  labels:
    app.kubernetes.io/name: product-api
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: cloudnative-commerce
spec:
  replicas: 3
  revisionHistoryLimit: 5
  selector:
    matchLabels:
      app.kubernetes.io/name: product-api

  template:
    metadata:
      labels:
        app.kubernetes.io/name: product-api
        app.kubernetes.io/component: api
        environment: prod
    spec:
      serviceAccountName: product-api
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: product-api
          image: 911788523496.dkr.ecr.ap-south-1.amazonaws.com/product-api:latest
          ports:
            - containerPort: 8080
              protocol: TCP
          env:
            - name: APP_ENV
              value: production
            - name: LOG_LEVEL
              value: info
          envFrom:
            - secretRef:
                name: product-api-secrets
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]

  strategy:
    canary:
      # Canary service receives canary traffic; stable service receives stable traffic.
      # These are regular K8s Services — Argo Rollouts manages the selector labels.
      canaryService: product-api-canary
      stableService: product-api-stable

      # Traffic routing via ingress-nginx — Argo Rollouts sets the
      # canary-weight annotation on the Ingress to control traffic split.
      trafficRouting:
        nginx:
          stableIngress: product-api-ingress
          additionalIngressAnnotations:
            canary-by-header: X-Canary
            canary-by-header-value: "true"

      # Canary progression steps:
      # Each step either sets a traffic weight or pauses for analysis.
      steps:
        # Step 1: Route 10% of traffic to canary
        - setWeight: 10
        # Pause for 30 seconds — let metrics accumulate before analysis
        - pause: { duration: 30s }

        # Step 2: Run analysis — check error rate and latency
        - analysis:
            templates:
              - templateName: canary-analysis
            args:
              - name: service-name
                value: product-api

        # Step 3: If analysis passed, bump to 30%
        - setWeight: 30
        - pause: { duration: 30s }

        # Step 4: Run analysis again at higher traffic
        - analysis:
            templates:
              - templateName: canary-analysis
            args:
              - name: service-name
                value: product-api

        # Step 5: 50% traffic
        - setWeight: 50
        - pause: { duration: 30s }

        # Step 6: Final promotion to 100% (automatic if all analyses pass)

      # Anti-affinity — spread canary and stable pods across nodes
      antiAffinity:
        preferredDuringSchedulingIgnoredDuringExecution:
          weight: 100

      # Automatic rollback if the canary fails
      abortScaleDownDelaySeconds: 30
