apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../../base/storefront

patches:
  - patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: storefront
        namespace: commerce
      spec:
        replicas: 2
        template:
          metadata:
            labels:
              app.kubernetes.io/version: staging

  - patch: |-
      apiVersion: autoscaling/v2
      kind: HorizontalPodAutoscaler
      metadata:
        name: storefront
        namespace: commerce
      spec:
        minReplicas: 2
        maxReplicas: 5

  - patch: |-
      apiVersion: v1
      kind: ServiceAccount
      metadata:
        name: storefront
        namespace: commerce
        annotations:
          eks.amazonaws.com/role-arn: arn:aws:iam::911788523496:role/cloudnative-commerce-staging-storefront-irsa

  - patch: |-
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: storefront-config
        namespace: commerce
      data:
        NODE_ENV: "production"
        NEXT_PUBLIC_API_URL: "https://api.staging.cloudnative-commerce.example.com"
