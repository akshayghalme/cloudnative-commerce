# CD Pipeline — Staging Promotion
#
# Promotes a tested dev image to staging. Requires manual approval via
# GitHub Environment protection rules.
#
# Flow:
#   Dev deploy succeeds → engineer triggers this workflow (workflow_dispatch)
#   → approval gate (GitHub Environment) → update staging image tags → commit
#   → ArgoCD syncs to staging cluster
#
# Why manual trigger (not automatic):
# - Dev auto-deploys on every merge (fast feedback)
# - Staging is a shared pre-prod environment — deploys should be intentional
# - The approval gate gives QA/leads a chance to review before staging changes

name: CD Staging

on:
  # Manual trigger with image tag input — engineer picks which version to promote
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to deploy (SHA short, e.g., abc1234)"
        required: true
        type: string
      services:
        description: "Services to deploy (comma-separated, or 'all')"
        required: true
        default: "all"
        type: string

concurrency:
  group: cd-staging
  cancel-in-progress: false

env:
  ECR_REGISTRY: 911788523496.dkr.ecr.ap-south-1.amazonaws.com

permissions:
  contents: write

jobs:
  promote-to-staging:
    name: "Promote to staging"
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    # GitHub Environment with required reviewers — the approval gate.
    # Configure in: Settings → Environments → staging → Required reviewers
    environment: staging

    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Kustomize
        uses: imranismail/setup-kustomize@v2.1.0
        with:
          kustomize-version: "5.4.3"

      - name: Determine services to update
        id: services
        run: |
          INPUT="${{ inputs.services }}"
          if [ "${INPUT}" = "all" ]; then
            echo "list=product-api storefront order-worker" >> "$GITHUB_OUTPUT"
          else
            # Convert comma-separated to space-separated
            echo "list=$(echo "${INPUT}" | tr ',' ' ')" >> "$GITHUB_OUTPUT"
          fi

      # Update staging overlay image tags for each selected service
      - name: Update staging image tags
        run: |
          TAG="${{ inputs.image_tag }}"
          for SERVICE in ${{ steps.services.outputs.list }}; do
            OVERLAY="kubernetes/overlays/staging/${SERVICE}"
            if [ -d "${OVERLAY}" ]; then
              echo "Updating ${SERVICE} to ${TAG}"
              cd "${OVERLAY}"
              kustomize edit set image \
                "${{ env.ECR_REGISTRY }}/${SERVICE}=${{ env.ECR_REGISTRY }}/${SERVICE}:${TAG}"
              cd -
            else
              echo "Warning: overlay ${OVERLAY} not found, skipping"
            fi
          done

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if git diff --quiet; then
            echo "No changes — skipping commit"
            exit 0
          fi

          git add kubernetes/overlays/staging/
          git commit -m "$(cat <<EOF
          deploy(staging): promote images to ${{ inputs.image_tag }}

          Services: ${{ inputs.services }}
          Approved by: ${{ github.actor }}
          Triggered: workflow_dispatch #${{ github.run_number }}
          EOF
          )"
          git push origin main

      - name: Summary
        run: |
          echo "### Staging Promotion" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Image tag:** \`${{ inputs.image_tag }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "**Services:** ${{ inputs.services }}" >> "$GITHUB_STEP_SUMMARY"
          echo "**Approved by:** ${{ github.actor }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "ArgoCD will sync these changes to the staging cluster." >> "$GITHUB_STEP_SUMMARY"
