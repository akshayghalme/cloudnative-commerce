# yamllint configuration
# Relaxed rules suitable for Kubernetes manifests and Helm values
# which often have long lines and document separators

extends: default

rules:
  # Kubernetes manifests commonly exceed 80 chars — allow up to 150
  line-length:
    max: 150
    level: warning

  # Allow both quoted and unquoted truthy values (true/false/"true"/"false")
  truthy:
    allowed-values: ["true", "false", "yes", "no", "on", "off"]
    level: warning

  # GitHub Actions workflows use duplicate keys in some contexts
  key-duplicates:
    level: warning

  # Allow document start markers (---) to be optional
  document-start:
    level: disable
