# ElasticMQ config — creates the orders queue on startup
# Mirrors the SQS queue that Terraform provisions in AWS

include classpath("application.conf")

queues {
  orders {
    defaultVisibilityTimeout = 60 seconds
    receiveMessageWait = 20 seconds
    deadLettersQueue {
      name = "orders-dlq"
      maxReceiveCount = 3
    }
  }
  orders-dlq {}
}

node-address {
  protocol = http
  host = "*"
  port = 9324
  context-path = ""
}

rest-sqs {
  enabled = true
  bind-port = 9324
  bind-hostname = "0.0.0.0"
  sqs-limits = strict
}

rest-sqs-limits = strict
