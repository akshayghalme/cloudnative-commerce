# Chaos RBAC — ServiceAccount + ClusterRole for running experiments.
#
# Litmus experiments need permissions to:
# - List/delete pods (pod-kill, pod-delete)
# - Evict nodes (node-drain)
# - Modify network (network-partition)
# - Read deployments, services (for targeting)
#
# This follows least-privilege: only the permissions needed for our
# specific experiments, scoped to the commerce namespace where possible.

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: litmus-chaos
  namespace: commerce
  labels:
    app.kubernetes.io/part-of: cloudnative-commerce
    app.kubernetes.io/component: chaos

---
# ClusterRole — some experiments (node-drain) need cluster-wide access
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: litmus-chaos-runner
  labels:
    app.kubernetes.io/part-of: cloudnative-commerce
    app.kubernetes.io/component: chaos
rules:
  # Pod operations — required for pod-kill, pod-delete experiments
  - apiGroups: [""]
    resources: ["pods", "pods/log", "pods/exec"]
    verbs: ["get", "list", "watch", "create", "delete", "deletecollection"]
  # Events — chaos experiments create events for observability
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "get", "list", "patch", "update"]
  # Deployments — for targeting and verifying recovery
  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets", "statefulsets", "daemonsets"]
    verbs: ["get", "list", "watch"]
  # Services — for network experiment targeting
  - apiGroups: [""]
    resources: ["services", "endpoints"]
    verbs: ["get", "list"]
  # Nodes — required for node-drain experiment
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list", "watch", "patch", "update"]
  # Jobs — Litmus runs experiments as Kubernetes Jobs
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["get", "list", "watch", "create", "delete"]
  # Litmus CRDs — read/write chaos resources
  - apiGroups: ["litmuschaos.io"]
    resources: ["chaosengines", "chaosexperiments", "chaosresults"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Network policies — for network-partition experiment
  - apiGroups: ["networking.k8s.io"]
    resources: ["networkpolicies"]
    verbs: ["get", "list", "create", "delete"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: litmus-chaos-runner
  labels:
    app.kubernetes.io/part-of: cloudnative-commerce
    app.kubernetes.io/component: chaos
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: litmus-chaos-runner
subjects:
  - kind: ServiceAccount
    name: litmus-chaos
    namespace: commerce
